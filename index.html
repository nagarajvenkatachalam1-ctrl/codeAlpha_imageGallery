<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Image Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; text-align: center; }
        h1 { margin-bottom: 30px; font-size: 2.5rem; letter-spacing: 1px; }
        
        /* 12 Photo Grid Layout */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 10px; }
        .gallery img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .gallery img:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.5); }

        /* Lightbox (Zoom Overlay) */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); justify-content: center; align-items: center; z-index: 1000; }
        .lightbox img { max-width: 90%; max-height: 85%; border-radius: 8px; box-shadow: 0 5px 25px rgba(255,255,255,0.2); }
        .close { position: absolute; top: 20px; right: 35px; font-size: 45px; color: #fff; cursor: pointer; font-weight: bold; }
        .close:hover { color: #ff5555; }
    </style>
</head>
<body>

    <h1>My Premium Image Gallery</h1>
    
    <div class="gallery">
        <img src="https://picsum.photos/id/10/600/400" alt="Image 1" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/16/600/400" alt="Image 2" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/28/600/400" alt="Image 3" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/29/600/400" alt="Image 4" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/43/600/400" alt="Image 5" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/48/600/400" alt="Image 6" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/54/600/400" alt="Image 7" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/57/600/400" alt="Image 8" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/65/600/400" alt="Image 9" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/76/600/400" alt="Image 10" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/84/600/400" alt="Image 11" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/96/600/400" alt="Image 12" onclick="openLightbox(this.src)">
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="Zoomed View">
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
