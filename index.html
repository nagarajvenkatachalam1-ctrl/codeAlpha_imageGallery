<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Image Gallery</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin: 20px 0;
            color: #333;
        }

        /* Responsive Grid Layout */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 200px;
        }

        /* Hover Effect */
        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Lightbox Overlay */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 80%;
            max-height: 80%;
            border-radius: 4px;
            box-shadow: 0 5px 25px rgba(255,255,255,0.2);
        }

        /* Control Buttons */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-btn {
            position: absolute;
            color: #fff;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px;
            user-select: none;
            transition: color 0.2s;
        }

        .nav-btn:hover {
            color: #00bcd4;
        }

        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }
    </style>
</head>
<body>

    <div class="gallery-container">

        <div class="gallery-item"><img src="https://picsum.photos/800/600?random=3" alt="Image 3"></div>
        <div class="gallery-item"><img src="https://picsum.photos/800/600?random=4" alt="Image 4"></div>
        <div class="gallery-item"><img src="https://picsum.photos/800/600?random=5" alt="Image 5"></div>
        <div class="gallery-item"><img src="https://picsum.photos/800/600?random=6" alt="Image 6"></div>
    </div>
